name: Release

# Запускается, когда в репозиторий пушится тег вида v1.2.3.
# Типичный цикл выпуска версии:
#   npm version 1.0.0      # поднимает version в package.json + создаёт коммит и тег
#   git push --follow-tags # пушит коммит и тег -> запускает этот workflow
on:
  push:
    tags:
      - 'v*'

# Нужно для создания GitHub Release (загрузка тега + ассетов).
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Сборка заодно служит проверкой типов (tsc -b) и сборки (vite):
      # если тег указывает на сломанный коммит, build упадёт и релиз
      # не будет создан.
      - name: Build
        run: npm run build

      # Упаковываем собранное приложение (папку dist) в zip,
      # чтобы приложить его к Release как скачиваемый артефакт.
      - name: Package build artifact
        run: |
          cd dist
          zip -r ../dnd-character-manager-${{ github.ref_name }}.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Заметки генерируются автоматически из заголовков
          # коммитов/PR между этим и предыдущим тегом.
          generate_release_notes: true
          files: dnd-character-manager-${{ github.ref_name }}.zip

  # Десктоп: собираем+подписываем NSIS-установщик на Windows и кладём готовые
  # файлы (установщик + latest.json) в release/ как артефакт. Версия берётся из
  # тега (v0.2.0 -> 0.2.0). См. scripts/release.ps1 и docs/UPDATE_SERVER.md.
  desktop-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build, sign, manifest
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          ./scripts/release.ps1 -Version $version -Notes "${{ github.ref_name }}" -SkipUpload

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-release
          path: release/

  # Заливаем артефакты на сервер обновлений по SSH (Linux-раннер + проверенный
  # scp-action — надёжнее, чем OpenSSH из-под Windows). strip_components убирает
  # префикс release/, файлы ложатся прямо в /var/www/updates.
  desktop-deploy:
    runs-on: ubuntu-latest
    needs: desktop-build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: desktop-release
          path: release

      - name: Upload to update server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: upd.azzydreamer.ru
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "release/*"
          target: /var/www/updates
          strip_components: 1
