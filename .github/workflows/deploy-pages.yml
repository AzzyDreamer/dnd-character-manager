name: Deploy to GitHub Pages

# Собирает приложение и публикует его на GitHub Pages.
# Запускается при каждом пуше в main (живой сайт всегда отражает main),
# а также вручную через кнопку Run workflow.
#
# Разовая настройка в репозитории (один раз):
#   Settings -> Pages -> Build and deployment -> Source: GitHub Actions
# После этого сайт будет доступен по адресу
#   https://<owner>.github.io/dnd-character-manager/
on:
  push:
    branches:
      - main
  workflow_dispatch:

# Права, необходимые для деплоя на Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Параллельные деплои не нужны: отменяем предыдущий незавершённый,
# но не прерываем уже идущую публикацию.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Десктоп-онли код (@tauri-apps/*, src/online/*) не должен статически
      # импортироваться в веб-бандл — иначе Pages-сборка распухнет/упадёт.
      - name: Check web-bundle purity
        run: npm run check:web-imports

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
